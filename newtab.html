<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #780E1E;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      animation: fadeIn 0.6s ease-out;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(120, 14, 30, 0.25) 0%,
        rgba(0, 0, 0, 0.1) 40%,
        rgba(0, 0, 0, 0.1) 60%,
        rgba(120, 14, 30, 0.35) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      padding-top: 10vh;
    }

    .clock {
      font-size: 72px;
      font-weight: 200;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
      letter-spacing: 4px;
    }

    .date {
      font-size: 18px;
      color: #FFD700;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .search-container {
      width: 580px;
      max-width: 90vw;
      margin-top: 4vh;
    }

    .search-bar {
      width: 100%;
      padding: 14px 24px;
      border: 2px solid rgba(245, 184, 0, 0.4);
      border-radius: 28px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-bar::placeholder {
      color: rgba(255, 215, 0, 0.6);
    }

    .search-bar:focus {
      border-color: #F5B800;
      background: rgba(0, 0, 0, 0.55);
      box-shadow: 0 0 20px rgba(245, 184, 0, 0.15);
    }

    .search-container {
      width: 580px;
      max-width: 90vw;
      margin-top: 4vh;
    }

    .shortcuts {
      display: flex;
      gap: 24px;
      margin-top: 3vh;
      border-top: 2px solid rgba(245, 184, 0, 0.5);
      padding-top: 3vh;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 700px;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .shortcut:hover {
      transform: scale(1.08);
    }

    .shortcut-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(245, 184, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFD700;
      font-size: 18px;
      font-weight: bold;
    }

    .shortcut-label {
      color: #fff;
      font-size: 11px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      max-width: 72px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .branding {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(120, 14, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(245, 184, 0, 0.3);
      border-radius: 20px;
      z-index: 2;
    }

    .branding span {
      color: #FFD700;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="search-container">
      <input type="text" class="search-bar" id="searchBar" placeholder="Search Google..." autofocus>
    </div>
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
    <div class="shortcuts" id="shortcuts"></div>
  </div>
  <div class="branding">
    <span>Tamizhaga Vetri Kazhagam</span>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
